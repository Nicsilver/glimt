name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build the
# portable exe and attach it to a GitHub Release (created if missing, assets clobbered
# if re-run). `workflow_dispatch` builds without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cargo build (release)
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: glimt
          path: target/release/glimt.exe

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/glimt.exe --clobber
